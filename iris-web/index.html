<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#050505" />
  <link rel="icon" type="image/png" href="/img/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Manrope:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.4/build/spline-viewer.js"></script>
  <title>YIGO AI - Voice-First Desktop AI Assistant</title>
</head>
<body>
  <div class="site-shell">
    <div class="scanline" aria-hidden="true"></div>
    <div class="route-flash" aria-hidden="true"></div>

    <header class="topbar" aria-label="Primary navigation">
      <a class="brand nav-route" href="/about" data-route="/about" aria-label="YIGO AI home">
        <img src="/img/logo.png" alt="" class="brand-logo" />
        <span>YIGO</span>
      </a>

      <nav class="desktop-nav" aria-label="Main links">
        <a class="nav-route" href="/about" data-route="/about">About</a>
        <a class="nav-route" href="/features" data-route="/features">Features</a>
        <a class="nav-route" href="/pricing" data-route="/pricing">Pricing</a>
        <a class="nav-route" href="/how-to-install" data-route="/how-to-install">Install</a>
        <a class="nav-route" href="/guide" data-route="/guide">Guide</a>
        <a class="nav-route" href="/docs" data-route="/docs">Docs</a>
        <a class="nav-route" href="/support" data-route="/support">Support</a>
        <a class="nav-route" href="/join" data-route="/join">Join Us</a>
      </nav>

      <div class="topbar-actions">
        <a class="download-pill nav-route" href="/download" data-route="/download">Download YIGO</a>
        <button class="icon-button nav-toggle" type="button" aria-label="Open menu" aria-expanded="false">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16M4 12h16M4 19h16"/></svg>
        </button>
      </div>
    </header>

    <div class="mobile-drawer" id="mobileDrawer" aria-label="Mobile navigation"></div>

    <button class="floating-menu" type="button" aria-label="Open navigation menu">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16M4 12h16M4 19h16"/></svg>
    </button>

    <div class="page-layout">
      <aside class="docs-sidebar" id="pageSidebar" aria-label="Page sections"></aside>
      <main class="page-main" id="app" tabindex="-1"></main>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
